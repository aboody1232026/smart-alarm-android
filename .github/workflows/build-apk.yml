name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython
        pip install buildozer
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '31'
        ndk-version: '25.1.8937393'
        build-tools: '31.0.0'
    
    - name: Build APK (Debug)
      run: |
        cd ${{ github.workspace }}
        buildozer -v android debug 2>&1 || {
          echo "First build attempt failed, checking logs..."
          cat .buildozer/android/platform/build-*/build.log || true
          exit 1
        }
    
    - name: Check APK
      run: |
        ls -lh bin/ || echo "No bin directory found"
        find . -name "*.apk" -type f || echo "No APK files found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: smartalarm-apk
        path: bin/*.apk
        retention-days: 30
