name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Check disk space
      run: |
        df -h / || true
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential libssl-dev libffi-dev python3-dev \
          libncurses5 libncurses5-dev zlib1g zlib1g-dev libbz2-1.0 \
          libbz2-dev lzma liblzma-dev libsqlite3-dev libreadline-dev \
          git wget curl openjdk-11-jdk || (echo "Some packages failed, continuing..." && true)
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel --quiet 2>&1 | tail -5
        pip install --upgrade cython --quiet 2>&1 | tail -5
        pip install buildozer --quiet 2>&1 | tail -5
        echo "=== Installing requirements.txt ==="
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt --quiet 2>&1 | tail -5
        fi
        echo "✓ Python dependencies installed"
    
    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v4
      with:
        api-levels: '31'
        ndk-version: '25.1.8937393'
        build-tools: '31.0.0'
    
    - name: Verify environment
      run: |
        echo "=== Java ==="
        java -version 2>&1 | head -3
        echo ""
        echo "=== Python ==="
        python3 --version
        echo ""
        echo "=== Buildozer ==="
        buildozer --version 2>&1 || echo "Buildozer version check failed"
        echo ""
        echo "=== Android SDK paths ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        echo ""
        echo "=== buildozer.spec ==="
        head -20 buildozer.spec 2>&1 || echo "Could not read buildozer.spec"
    
    - name: Build APK (Debug)
      continue-on-error: true
      run: |
        echo "=== Starting buildozer build ==="
        set -x
        buildozer -v android debug 2>&1
        exit_code=$?
        echo "Build exit code: $exit_code"
        exit $exit_code
    
    - name: Check for APK
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null && echo "✓ APK found!" || echo "✗ No APK"
        echo ""
        echo "=== Bin directory contents ==="
        if [ -d bin ]; then
          ls -lah bin/
        else
          echo "No bin directory"
        fi
    
    - name: Upload APK
      if: always()
      continue-on-error: true5
      with:
        name: smartalarm-apk
        path: bin/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Capture Build Logs
      if: always()
      continue-on-error: true
      run: |
        echo "=== FULL BUILD LOGS ===" 
        if [ -d ".buildozer/android/platform" ]; then
          find .buildozer/android/platform -name "*.log" -type f -exec echo "--- {} ---" \; -exec cat {} \;
        else
          echo "No build logs found"
        fi warn
        retention-days: 30
