name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libssl-dev libffi-dev python3-dev \
          libncurses5 libncurses5-dev zlib1g zlib1g-dev libbz2-1.0 \
          libbz2-dev lzma liblzma-dev libsqlite3-dev libreadline-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython
        pip install buildozer
        pip install -r requirements.txt
    
    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v4
      with:
        api-levels: '31'
        ndk-version: '25.1.8937393'
        build-tools: '31.0.0'
    
    - name: Verify buildozer.spec
      run: |
        echo "=== Checking buildozer.spec ==="
        head -30 buildozer.spec
        echo ""
        echo "=== Checking requirements.txt ==="
        cat requirements.txt
        echo ""
        echo "=== Environment Variables ==="
        env | grep -E "ANDROID|JAVA" || echo "No Android/Java env vars found"
    
    - name: Build APK (Debug)
      run: |
        cd ${{ github.workspace }}
        echo "=== Starting buildozer build ==="
        set -x
        buildozer -v android debug
        set +x
        echo "=== Build completed ==="
      continue-on-error: true
    
    - name: Check for build logs and errors
      if: always()
      run: |
        echo "=== Looking for build logs ==="
        find .buildozer -name "build.log" -type f -exec echo "Found: {}" \; -exec tail -50 {} \;
        echo ""
        echo "=== Checking for APK files ==="
        ls -lh bin/ 2>/dev/null || echo "No bin directory found"
        find . -name "*.apk" -type f || echo "No APK files found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: smartalarm-apk
        path: bin/*.apk
        retention-days: 30
