name: Build APK (Minimal)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-minimal:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libssl-dev libffi-dev python3-dev \
          libncurses5 libncurses5-dev zlib1g zlib1g-dev libbz2-1.0 \
          libbz2-dev lzma liblzma-dev libsqlite3-dev libreadline-dev
    
    - name: Install Python dependencies (minimal)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython
        pip install buildozer
        # Install only core dependencies for testing
        pip install kivy==2.3.1 schedule==1.2.0 requests==2.31.0 pycryptodome==3.17.0
    
    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v4
      with:
        api-levels: '31'
        ndk-version: '25.1.8937393'
        build-tools: '31.0.0'
    
    - name: Build APK (Minimal - No Device Libs)
      run: |
        cd ${{ github.workspace }}
        echo "=== Building minimal APK ==="
        set -x
        buildozer -v android ${{ github.event.inputs.build_type }}
        set +x
      continue-on-error: true
    
    - name: Check build results
      if: always()
      run: |
        echo "=== Build artifacts ==="
        find . -name "*.apk" -type f -exec ls -lh {} \;
        find .buildozer -name "build.log" -type f -exec echo "=== Build log ===" \; -exec tail -100 {} \;
    
    - name: Upload APK  
      if: success()
      uses: actions/upload-artifact@v5
      with:
        name: smartalarm-apk-minimal
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: warn
